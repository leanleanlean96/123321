# Полный стек: приложение + observability в одной Docker-сети.
# Запуск из корня проекта:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
name: todo-app

services:
  backend:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_SERVICE_NAME: todo-backend
    networks:
      - default

  prometheus:
    image: prom/prometheus:v2.53.3
    container_name: todo-prometheus-stack
    volumes:
      - ./observability/compose-stack/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - default

  tempo:
    image: grafana/tempo:2.6.1
    container_name: todo-tempo-stack
    command:
      - "-config.file=/etc/tempo.yaml"
    volumes:
      - ./observability/compose/tempo/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped
    networks:
      - default

  loki:
    image: grafana/loki:3.0.0
    container_name: todo-loki-stack
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./observability/compose/loki/loki.yaml:/etc/loki/loki.yaml:ro
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - default

  promtail:
    image: grafana/promtail:3.0.0
    container_name: todo-promtail-stack
    command: -config.file=/etc/promtail/promtail.yaml
    volumes:
      - ./observability/compose/loki/promtail.yaml:/etc/promtail/promtail.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - default

  grafana:
    image: grafana/grafana:11.3.0
    container_name: todo-grafana-stack
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./observability/compose/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/compose/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped
    networks:
      - default

networks:
  default:
    name: todo-app_default