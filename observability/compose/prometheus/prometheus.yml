global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Прометей собирает метрики о себе — цель всегда UP.
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  # TODO backend на хосте: если запущен через docker compose -p todo-app
  # с пробросом 8080 на хост — будет UP.
  - job_name: todo-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
