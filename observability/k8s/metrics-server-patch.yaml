# Metrics Server нужен для работы HPA.
# Применять ПОСЛЕ установки metrics-server:
#
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#   kubectl apply -f observability/k8s/metrics-server-patch.yaml
#
# Патч отключает проверку TLS-сертификата kubelet — необходимо для Docker Desktop.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  template:
    spec:
      containers:
        - name: metrics-server
          args:
            - --cert-dir=/tmp
            - --secure-port=10250
            - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
            - --kubelet-use-node-status-port
            - --metric-resolution=15s
            - --kubelet-insecure-tls
