# Promtail — агент сбора логов с Pod-ов кластера.
# Установка:
#   helm upgrade --install promtail grafana/promtail \
#     --namespace observability \
#     -f values-dev.yaml
config:
  clients:
    - url: http://loki:3100/loki/api/v1/push

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
