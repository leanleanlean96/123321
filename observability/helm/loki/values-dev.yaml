# Loki + Promtail для учебного кластера.
# Установка:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm repo update
#   helm upgrade --install loki grafana/loki \
#     --namespace observability --create-namespace \
#     -f values-dev.yaml
auth_enabled: false

loki:
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  auth_enabled: false

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

monitoring:
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false

test:
  enabled: false
