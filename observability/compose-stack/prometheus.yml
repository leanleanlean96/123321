global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  # В связке docker-compose.observability.yml backend доступен по имени сервиса.
  - job_name: todo-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8080"]
