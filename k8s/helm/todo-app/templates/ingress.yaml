{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app: todo-app
    component: ingress
    {{- range $k, $v := .Values.labels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
    {{- if .Values.environment }}
    environment: {{ .Values.environment | quote }}
    {{- end }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: todo-backend
                port:
                  number: 8080
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: todo-backend
                port:
                  number: 8080
          - path: /health
            pathType: Exact
            backend:
              service:
                name: todo-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: todo-frontend
                port:
                  number: 80
{{- end }}
