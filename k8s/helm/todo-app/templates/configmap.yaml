apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: todo-app
    component: config
    {{- range $k, $v := .Values.labels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
    {{- if .Values.environment }}
    environment: {{ .Values.environment | quote }}
    {{- end }}
data:
  PORT_BACKEND: "8080"
  PORT_FRONTEND: "3000"
  HOST: "0.0.0.0"
  API_URL: {{ .Values.config.apiUrl | quote }}
