apiVersion: v1
kind: Secret
metadata:
  name: todo-secrets
  labels:
    app: todo-app
    component: secrets
type: Opaque
stringData:
  # DEV: БД в том же namespace todo-demo.
  # Контракт согласован с infra/postgres/k8s/kustomization/overlays/dev.
  # Headless Service `postgres` -> стабильный DNS pod-0: postgres-0.postgres.
  database-url: "postgres://todo:todo@postgres-0.postgres:5432/todo?sslmode=disable"
