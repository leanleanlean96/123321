apiVersion: v1
kind: Secret
metadata:
  name: todo-secrets
  labels:
    app: todo-app
    component: secrets
type: Opaque
stringData:
  # PROD: приложение в namespace todo-prod, БД в todo-demo (или своём infra-namespace).
  # Используем FQDN для меж-namespace доступа (пример контракта между приложением и платформой).
  # В реальном проде значение приходит из CI / Sealed Secrets / External Secrets — НЕ коммитьте пароли.
  database-url: "postgres://todo:CHANGE_ME_IN_CI@postgres-0.postgres.todo-demo.svc.cluster.local:5432/todo?sslmode=disable"
