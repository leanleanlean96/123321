# Локальный запуск всего приложения для отладки.
# Аналог промышленного K8s-стенда из лаб. 5/6, но монолитный (как в подсказке к лабораторной).
name: todo-app

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://todo:todo@postgres:5432/todo
      PORT: "8080"
      HOST: "0.0.0.0"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      API_URL: http://localhost:8080
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
